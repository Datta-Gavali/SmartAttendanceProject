<!DOCTYPE html>
<html>

<head>
    <title>Mark Attendance</title>
</head>

<body>

    <h1>Mark Attendance</h1>

    {% if message %}
    <p>{{ message }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="number" name="student_id" placeholder="Enter Student ID">

        <br><br>

        <button type="submit">Mark Present</button>

    </form>

</body>

</html>
