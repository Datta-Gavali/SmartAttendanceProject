<!DOCTYPE html>
<html>

<head>
    <title>Add Student</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border: 1px solid gray;
            border-radius: 8px;
        }

        button {
            padding: 12px 30px;
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: green;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Add Student</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Enter Name" required>

            <input type="text" name="roll_number" placeholder="Enter Roll Number" required>

            <input type="text" name="department" placeholder="Enter Department" required>

            <br><br>

            <button type="submit">Save Student</button>


            <p>{{ message }}</p>


        </form>

    </div>

</body>

</html>
